<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Barbearia</title>
    <style>
        body { background: #0c0d0f; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #111216; padding: 30px; border-radius: 10px; border: 1px solid #77e0e6; width: 300px; }
        h2 { color: #77e0e6; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0c0d0f; border: 1px solid #2a2d33; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #77e0e6; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #msg { text-align: center; margin-top: 10px; color: #ff4444; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>BARBEARIA</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">ENTRAR</button>
        <div id="msg"></div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({user: user, pass: pass})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('msg').innerText = data.message;
                }
            });
        }
    </script>
</body>
</html>
