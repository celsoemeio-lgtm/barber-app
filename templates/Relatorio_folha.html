<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fechamento - Barber App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #080a0f;
      color: #fff;
      font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #00ffff;
    }
    
    .btn-voltar-img {
      width: 150px;
      height: 35px;
      background: none;
      border: none;
      cursor: pointer;
      outline: none;
      padding: 0;
      flex-shrink: 0;
    }
    
    .btn-voltar-img img {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    
    h1 {
      color: #00ffff;
      font-size: 18px;
      text-transform: uppercase;
      margin: 0;
      text-align: center;
      flex: 1;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1px;
    }
    
    .btn-pdf {
      background: #1a1d23;
      color: #fff;
      border: 1px solid #00ffff;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .btn-pdf:hover {
      background: #00ffff;
      color: #000;
    }
    
    .info-card {
      background: #11141b;
      border-left: 4px solid #00ffff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .perfil {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .foto {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #00ffff;
      object-fit: cover;
      background: #080a0f;
    }
    
    .nome {
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      margin: 0;
    }
    
    .periodo {
      font-size: 12px;
      color: #00ffff;
      margin-top: 5px;
    }
    
    .filtros {
      background: #11141b;
      border: 1px solid #1f232d;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .campo {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      font-size: 11px;
      color: #00ffff;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    
    select, input {
      width: 100%;
      background: #080a0f;
      border: 1px solid #2d323a;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      font-family: 'Montserrat', sans-serif;
    }
    
    select:focus, input:focus {
      border-color: #00ffff;
    }
    
    .linha-dupla {
      display: flex;
      gap: 10px;
    }
    
    .linha-dupla .campo {
      flex: 1;
    }
    
    .btn-gerar {
      width: 100%;
      background: #00ffff;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
    }
    
    .btn-gerar:hover {
      background: #00cccc;
      transform: scale(1.02);
    }
    
    .btn-gerar:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }
    
    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      display: none;
    }
    
    .card {
      background: #11141b;
      border: 1px solid #1f232d;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .card h3 {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }
    
    .card .valor {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    
    .card .detalhe {
      font-size: 10px;
      color: #00ffff;
      margin-top: 5px;
      display: block;
    }
    
    .tabela-container {
      display: none;
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: #080a0f;
      color: #00ffff;
      padding: 10px;
      text-align: left;
      font-size: 11px;
      border-bottom: 2px solid #00ffff;
      font-weight: bold;
    }
    
    td {
      padding: 10px;
      border-bottom: 1px solid #1c212a;
      font-size: 12px;
    }
    
    .vip {
      color: #00ffff;
      font-weight: bold;
    }
    
    .sem-dados {
      text-align: center;
      padding: 20px;
      color: #888;
    }
    
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      
      .btn-voltar-img {
        width: 100px;
        height: 28px;
      }
      
      h1 {
        font-size: 14px;
      }
      
      .btn-pdf {
        padding: 6px 10px;
        font-size: 10px;
      }
      
      .card .valor {
        font-size: 14px;
      }
      
      .nome {
        font-size: 14px;
      }
      
      .foto {
        width: 50px;
        height: 50px;
      }
    }
    
    @media print {
      body {
        background: #fff;
        color: #000;
        padding: 0;
      }
      
      .header,
      .filtros,
      .btn-pdf,
      .btn-gerar {
        display: none !important;
      }
      
      .info-card {
        display: block !important;
        border: 1px solid #000;
        background: #fff !important;
      }
      
      .dashboard {
        display: grid !important;
      }
      
      .card {
        border: 1px solid #ccc !important;
      }
      
      .foto {
        border: 2px solid #000;
      }
      
      .card .valor {
        color: #000;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn-voltar-img" onclick="voltarDashboard()">
        <img src="https://lh3.googleusercontent.com/u/0/d/1V1WBS99sZAVN_6oBqmD1xa8MtOxBd73l" alt="VOLTAR">
      </button>
      <h1>📊 FECHAMENTO</h1>
      <button class="btn-pdf" onclick="window.print()">PDF</button>
    </div>
    
    <div id="infoCard" class="info-card">
      <div class="perfil">
        <img id="foto" class="foto" src="" alt="Foto">
        <div>
          <div id="nome" class="nome"></div>
          <div id="periodo" class="periodo"></div>
        </div>
      </div>
    </div>
    
    <div class="filtros">
      <div class="campo">
        <label>BARBEIRO</label>
        <select id="barbeiro">
          <option value="">Carregando...</option>
        </select>
      </div>
      
      <div class="linha-dupla">
        <div class="campo">
          <label>DATA INÍCIO</label>
          <input type="date" id="dataInicio">
        </div>
        <div class="campo">
          <label>DATA FIM</label>
          <input type="date" id="dataFim">
        </div>
      </div>
      
      <div class="linha-dupla">
        <div class="campo">
          <label>ASSINATURA (R$)</label>
          <input type="number" id="assinatura" value="80" step="10">
        </div>
        <div class="campo">
          <label>BARBEARIA (%)</label>
          <input type="number" id="percentualCasa" value="50" step="5">
        </div>
      </div>
      
      <button class="btn-gerar" id="btnGerar" onclick="gerarRelatorio()">GERAR RELATÓRIO</button>
    </div>
    
    <div id="dashboard" class="dashboard">
      <div class="card">
        <h3>BRUTO</h3>
        <div id="bruto" class="valor">R$ 0,00</div>
        <span id="qtdAtendimentos" class="detalhe">0 atend.</span>
      </div>
      <div class="card">
        <h3>BÔNUS VIP</h3>
        <div id="bonusVip" class="valor">R$ 0,00</div>
        <span id="qtdVips" class="detalhe">0 VIPs</span>
      </div>
      <div class="card">
        <h3>LÍQUIDO</h3>
        <div id="liquido" class="valor" style="color: #00ffff;">R$ 0,00</div>
        <span id="comissaoBase" class="detalhe">Comissão: 0%</span>
      </div>
      <div class="card">
        <h3>OCUPAÇÃO</h3>
        <div id="ocupacao" class="valor">0%</div>
        <span class="detalhe">Eficiência</span>
      </div>
    </div>
    
    <div id="tabelaContainer" class="tabela-container">
      <table>
        <thead>
          <tr>
            <th>DATA</th>
            <th>SERVIÇO</th>
            <th style="text-align: right">VALOR</th>
          </tr>
        </thead>
        <tbody id="tabelaBody">
          <tr>
            <td colspan="3" class="sem-dados">Nenhum serviço encontrado</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <script>
    function voltarDashboard() {
      window.location.href = '/dashboard';
    }
    
    window.onload = function() {
      fetch('/api/usuario_atual', {
        credentials: 'include'
      })
      .then(res => res.json())
      .then(user => {
        console.log('✅ Usuário:', user);
        // Verifica se tem nome (indica que está logado)
        if (!user.nome) {
          document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Você não está logado! <br> Faça login em /dashboard primeiro.</div>';
          return;
        }
        
        const hoje = new Date();
        const trintaDiasAtras = new Date();
        trintaDiasAtras.setDate(hoje.getDate() - 30);
        
        document.getElementById('dataFim').value = hoje.toISOString().split('T')[0];
        document.getElementById('dataInicio').value = trintaDiasAtras.toISOString().split('T')[0];
        
        carregarBarbeiros();
      })
      .catch(err => {
        console.error('❌ Erro:', err);
        document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Erro: ' + err.message + '</div>';
      });
    };
    
    function carregarBarbeiros() {
      fetch('/api/barbeiros/listar', {
        credentials: 'include'
      })
      .then(res => {
        if (!res.ok) {
          throw new Error('Erro ao carregar barbeiros');
        }
        return res.json();
      })
      .then(lista => {
        const select = document.getElementById('barbeiro');
        select.innerHTML = '<option value="">Selecionar barbeiro...</option>';
        lista.forEach(nome => {
          const option = document.createElement('option');
          option.value = nome;
          option.textContent = nome;
          select.appendChild(option);
        });
      })
      .catch(err => {
        console.error('Erro:', err);
        document.getElementById('barbeiro').innerHTML = '<option value="">Erro ao carregar</option>';
      });
    }
    
    function gerarRelatorio() {
      const barbeiro = document.getElementById('barbeiro').value;
      const dataInicio = document.getElementById('dataInicio').value;
      const dataFim = document.getElementById('dataFim').value;
      const assinatura = document.getElementById('assinatura').value;
      const percentualCasa = document.getElementById('percentualCasa').value;
      
      if (!barbeiro) {
        alert('Selecione um barbeiro!');
        return;
      }
      
      if (!dataInicio || !dataFim) {
        alert('Selecione as datas!');
        return;
      }
      
      const btn = document.getElementById('btnGerar');
      btn.disabled = true;
      btn.textContent = 'PROCESSANDO...';
      
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('tabelaContainer').style.display = 'none';
      document.getElementById('infoCard').style.display = 'none';
      
      fetch('/api/relatorios/fechamento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          barbeiro: barbeiro,
          data_inicio: dataInicio,
          data_fim: dataFim,
          valor_assinatura: parseFloat(assinatura),
          perc_casa: parseFloat(percentualCasa)
        })
      })
      .then(res => {
        if (!res.ok) {
          throw new Error(`Erro HTTP: ${res.status}`);
        }
        return res.json();
      })
      .then(dados => {
        btn.disabled = false;
        btn.textContent = 'GERAR RELATÓRIO';
        
        if (dados.erro) {
          alert('Erro: ' + dados.erro);
          return;
        }
        
        const dataInicioFormat = dataInicio.split('-').reverse().join('/');
        const dataFimFormat = dataFim.split('-').reverse().join('/');
        
        document.getElementById('foto').src = dados.foto || 'https://via.placeholder.com/60';
        document.getElementById('nome').textContent = barbeiro;
        document.getElementById('periodo').textContent = `Período: ${dataInicioFormat} até ${dataFimFormat}`;
        document.getElementById('infoCard').style.display = 'block';
        
        document.getElementById('bruto').textContent = `R$ ${(dados.totalVendas || 0).toFixed(2)}`;
        document.getElementById('bonusVip').textContent = `R$ ${(dados.valorUnitarioCesta || 0).toFixed(2)}`;
        document.getElementById('liquido').textContent = `R$ ${(dados.totalComissao || 0).toFixed(2)}`;
        document.getElementById('qtdAtendimentos').textContent = `${dados.qtdAtendimentosReais || 0} atend.`;
        document.getElementById('qtdVips').textContent = `${dados.qtdVips || 0} VIPs`;
        document.getElementById('comissaoBase').textContent = `Comissão: ${dados.percComissaoBase || 0}%`;
        document.getElementById('ocupacao').textContent = `${(dados.taxaOcupacao || 0).toFixed(1)}%`;
        
        document.getElementById('dashboard').style.display = 'grid';
        
        const tbody = document.getElementById('tabelaBody');
        if (dados.servicos && dados.servicos.length > 0) {
          let html = '';
          dados.servicos.forEach(servico => {
            const vipClass = servico.isVip ? 'vip' : '';
            const vipMark = servico.isVip ? ' ✓' : '';
            html += `
              <tr>
                <td>${servico.data}</td>
                <td class="${vipClass}">${servico.detalhe}${vipMark}</td>
                <td style="text-align: right">R$ ${servico.valor.toFixed(2)}</td>
              </tr>
            `;
          });
          tbody.innerHTML = html;
        } else {
          tbody.innerHTML = '<tr><td colspan="3" class="sem-dados">Nenhum serviço encontrado no período</td></tr>';
        }
        
        document.getElementById('tabelaContainer').style.display = 'block';
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = 'GERAR RELATÓRIO';
        console.error('Erro:', err);
        alert('Erro ao gerar relatório: ' + err.message);
      });
    }
  </script>
</body>
</html>
