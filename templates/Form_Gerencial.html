<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    :root {
      --bg-dark: #0c0d0f;
      --bg-card: #111216;
      --primary: #77e0e6;
      --primary-dim: rgba(119, 224, 230, 0.15);
      --text-main: #b0b5be;
      --text-highlight: #e0e6eb;
      --border: #2a2d33;
      --shadow: rgba(119, 224, 230, 0.6);
      --gold: #ffd700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      font-family: 'Roboto', sans-serif; 
      background-color: var(--bg-dark); 
      color: var(--text-main); 
      padding: 12px;
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    .btn-voltar-img {
      width: 140px;
      height: 32px;
      background: none;
      border: none;
      cursor: pointer;
      outline: none;
      padding: 0;
      margin-bottom: 15px;
      display: inline-block;
    }
    .btn-voltar-img img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain;
    }

    h2 { 
      text-align: center; 
      color: var(--primary); 
      text-transform: uppercase; 
      letter-spacing: 2px;
      font-size: 14px; 
      margin: 15px 0;
      font-weight: 700;
    }

    .header-bar {
      background: var(--bg-card);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .filter-group {
      margin-bottom: 12px;
    }
    
    .filter-group:last-child {
      margin-bottom: 0;
    }
    
    label { 
      display: block; 
      margin-bottom: 6px; 
      font-size: 11px; 
      color: var(--primary); 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 0.5px;
    }

    input[type="date"] {
      width: 100%; 
      padding: 12px; 
      background: var(--bg-dark); 
      border: 1px solid var(--border); 
      color: var(--text-highlight);
      border-radius: 8px; 
      box-sizing: border-box; 
      font-size: 14px; 
      outline: none;
      font-family: 'Roboto', sans-serif;
    }
    
    input[type="date"]:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 8px var(--shadow); 
    }

    button {
      width: 100%; 
      padding: 14px; 
      background: var(--primary); 
      color: #000; 
      border: none; 
      font-weight: 700; 
      text-transform: uppercase; 
      cursor: pointer; 
      border-radius: 8px; 
      font-size: 14px; 
      transition: all 0.3s ease;
      letter-spacing: 1px;
      font-family: 'Roboto', sans-serif;
      margin-top: 8px;
    }
    
    button:hover { 
      opacity: 0.9; 
      transform: scale(0.98);
    }

    /* KPI Cards */
    .kpi-container { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 10px; 
      margin-bottom: 20px;
    }
    
    .kpi-card {
      background: var(--bg-card); 
      padding: 14px 8px; 
      border-radius: 12px;
      border: 1px solid var(--border); 
      text-align: center;
      transition: 0.3s;
    }
    
    .kpi-card:hover { 
      border-color: var(--primary); 
      box-shadow: 0 0 8px var(--primary-dim); 
    }
    
    .kpi-title { 
      font-size: 10px; 
      color: var(--text-main); 
      text-transform: uppercase; 
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    
    .kpi-value { 
      font-size: 18px; 
      font-weight: bold; 
      color: var(--primary);
    }

    /* Ranking da Equipe */
    .barber-grid { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 16px; 
      margin-top: 10px;
    }
    
    .barber-card { 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      overflow: hidden; 
      transition: 0.3s;
    }
    
    .barber-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 12px var(--primary-dim);
    }
    
    .card-header { 
      height: 180px; 
      width: 100%; 
      background-color: #000;
      position: relative; 
      overflow: hidden;
    }
    
    .barber-photo { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      object-position: center;
    }
    
    .badge-ocup { 
      position: absolute; 
      top: 10px; 
      left: 10px; 
      background: rgba(0,0,0,0.85); 
      color: var(--primary); 
      padding: 4px 10px; 
      border-radius: 20px; 
      font-size: 10px; 
      font-weight: bold; 
      border: 1px solid var(--primary);
      z-index: 10;
    }

    .badge-vips {
      position: absolute; 
      top: 10px; 
      right: 10px; 
      background: rgba(0, 0, 0, 0.85); 
      color: #fff; 
      padding: 4px 10px; 
      border-radius: 20px; 
      font-size: 10px; 
      font-weight: bold; 
      border: 1px solid var(--gold);
      z-index: 10;
    }
    
    .star-icon { 
      color: var(--gold); 
      margin-right: 4px; 
    }

    .card-body { 
      padding: 16px; 
    }
    
    .barber-name { 
      text-align: center; 
      font-size: 16px; 
      font-weight: bold; 
      color: var(--text-highlight); 
      text-transform: uppercase; 
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    
    .stats-row { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 8px; 
      margin-bottom: 16px; 
    }
    
    .stat-item { 
      background: var(--bg-dark); 
      padding: 10px 4px; 
      border-radius: 8px; 
      text-align: center; 
      border: 1px solid var(--border); 
    }
    
    .stat-label { 
      font-size: 9px; 
      color: var(--text-main); 
      text-transform: uppercase; 
      display: block; 
      margin-bottom: 4px;
    }
    
    .stat-val { 
      font-size: 14px; 
      font-weight: bold; 
      color: var(--primary);
    }

    .progress-container { 
      margin: 12px 0; 
    }
    
    .progress-info { 
      display: flex; 
      justify-content: space-between; 
      font-size: 10px; 
      margin-bottom: 6px; 
      font-weight: bold;
      color: var(--text-main);
    }
    
    .progress-bg { 
      width: 100%; 
      background: #08090a; 
      height: 8px; 
      border-radius: 10px; 
      border: 1px solid #1a1d21; 
      overflow: hidden; 
    }
    
    .progress-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #53c4cb 0%, var(--primary) 100%);
      box-shadow: 0 0 6px var(--shadow); 
      transition: width 0.6s ease; 
      border-radius: 10px;
    }
    
    .fill-complete { 
      background: linear-gradient(90deg, #00e676 0%, #00ff88 100%) !important; 
      box-shadow: 0 0 8px rgba(0,255,136,0.6) !important; 
    }

    .meta-tag { 
      text-align: center; 
      padding: 10px; 
      border-radius: 8px; 
      font-size: 11px; 
      font-weight: bold; 
      text-transform: uppercase; 
      border: 1px solid var(--border); 
      letter-spacing: 1px;
      margin-top: 8px;
    }
    
    .meta-batida { 
      color: #00ff88; 
      border-color: #00ff88; 
      background: rgba(0,255,136,0.06);
    }
    
    .meta-pendente { 
      color: #ff4444; 
      border-color: #ff4444; 
      background: rgba(255,68,68,0.06);
    }

    /* Tabela de Detalhamento por Dia */
    .tabela-dias {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin: 20px 0;
      overflow-x: auto;
    }
    
    .tabela-dias h3 {
      padding: 15px;
      color: var(--primary);
      font-size: 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    
    .dias-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    .dias-table th {
      background: var(--bg-dark);
      color: var(--primary);
      padding: 12px 8px;
      text-align: center;
      border-bottom: 2px solid var(--primary);
      font-weight: bold;
      font-size: 11px;
    }
    
    .dias-table td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      color: var(--text-highlight);
    }
    
    .dias-table tr:hover {
      background: rgba(119, 224, 230, 0.05);
    }
    
    .dia-faturamento {
      color: var(--primary);
      font-weight: bold;
    }

    .loading { 
      text-align: center; 
      color: var(--primary); 
      padding: 40px; 
      display: none; 
      font-size: 12px; 
      font-weight: bold;
    }

    @media (max-width: 380px) {
      body {
        padding: 8px;
      }
      
      .kpi-value {
        font-size: 14px;
      }
      
      .kpi-title {
        font-size: 9px;
      }
      
      .stat-val {
        font-size: 12px;
      }
      
      .barber-name {
        font-size: 14px;
      }
      
      .card-header {
        height: 160px;
      }
      
      .dias-table th, .dias-table td {
        padding: 8px 4px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn-voltar-img" onclick="voltarDash()">
      <img src="https://lh3.googleusercontent.com/u/0/d/1V1WBS99sZAVN_6oBqmD1xa8MtOxBd73l" alt="VOLTAR">
    </button>

    <h2>RELATÓRIO DE ELITE</h2>

    <div class="header-bar">
      <div class="filter-group">
        <label>Data Início</label>
        <input type="date" id="dataI">
      </div>
      <div class="filter-group">
        <label>Data Fim</label>
        <input type="date" id="dataF">
      </div>
      <button onclick="executarRelatorio()">BUSCAR DADOS</button>
    </div>

    <div id="msgLoading" class="loading">SINCRONIZANDO DADOS...</div>

    <div id="content" style="display: none;">
      <div class="kpi-container" id="kpi-list"></div>
      
      <!-- Tabela de Detalhamento por Dia -->
      <div id="tabelaDias" class="tabela-dias" style="display: none;">
        <h3>📅 DETALHAMENTO POR DIA</h3>
        <table class="dias-table">
          <thead>
            <tr>
              <th>DATA</th>
              <th>FATURAMENTO</th>
              <th>ATENDIMENTOS</th>
              <th>OCUPAÇÃO</th>
              <th>TICKET MÉDIO</th>
            </tr>
          </thead>
          <tbody id="diasBody">
            <tr><td colspan="5" style="text-align: center;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
      
      <h2>RANKING DA EQUIPE</h2>
      <div class="barber-grid" id="barber-list"></div>
    </div>
  </div>

  <script>
    function voltarDash() {
      window.location.href = '/dashboard';
    }

    function executarRelatorio() {
      const d1 = document.getElementById('dataI').value;
      const d2 = document.getElementById('dataF').value;
      if(!d1 || !d2) return alert("Por favor, selecione as datas.");
      
      document.getElementById('msgLoading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      document.getElementById('tabelaDias').style.display = 'none';

      fetch('/api/relatorios/gerencial', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ data_inicio: d1, data_fim: d2 })
      })
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        document.getElementById('msgLoading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        if(data.error) {
          alert("Erro: " + data.error);
          return;
        }

        // KPIs
        const g = data.geral;
        document.getElementById('kpi-list').innerHTML = `
          <div class="kpi-card"><div class="kpi-title">FATURAMENTO</div><div class="kpi-value">R$ ${g.fatBruto.toFixed(2)}</div></div>
          <div class="kpi-card"><div class="kpi-title">NOVOS CLIENTES</div><div class="kpi-value">${g.clientesComuns}</div></div>
          <div class="kpi-card"><div class="kpi-title">VIPs ATIVOS</div><div class="kpi-value">${g.assinaturas}</div></div>
          <div class="kpi-card"><div class="kpi-title">TICKET MÉDIO</div><div class="kpi-value">R$ ${g.ticketMedio.toFixed(2)}</div></div>
        `;

        // Tabela de dias
        if (data.dias && data.dias.length > 0) {
          let diasHTML = '';
          data.dias.forEach(dia => {
            diasHTML += `
              <tr>
                <td>${dia.data}</td>
                <td class="dia-faturamento">R$ ${dia.faturamento.toFixed(2)}</td>
                <td>${dia.atendimentos}</td>
                <td>${dia.ocupacao}%</td>
                <td>R$ ${dia.ticketMedio.toFixed(2)}</td>
              </tr>
            `;
          });
          document.getElementById('diasBody').innerHTML = diasHTML;
          document.getElementById('tabelaDias').style.display = 'block';
        } else {
          document.getElementById('tabelaDias').style.display = 'none';
        }

        // Ranking dos barbeiros
        let barberHTML = '';
        data.barbeiros.forEach(b => {
          const metaStatus = b.metaAtingida ? 'meta-batida' : 'meta-pendente';
          const metaTexto = b.metaAtingida ? '✅ META ALCANÇADA' : '⚠️ META PENDENTE';
          const corBarra = b.metaAtingida ? 'fill-complete' : '';
          const foto = b.foto || 'https://via.placeholder.com/400x300?text=Barbeiro';
          
          barberHTML += `
            <div class="barber-card">
              <div class="card-header">
                <img src="${foto}" class="barber-photo" alt="Foto de ${b.nome}" onerror="this.src='https://via.placeholder.com/400x300?text=Barbeiro'">
                <div class="badge-ocup">📊 ${b.ocupacao}%</div>
                <div class="badge-vips"><span class="star-icon">★</span> ${b.vips}</div>
              </div>
              <div class="card-body">
                <div class="barber-name">${b.nome}</div>
                <div class="stats-row">
                  <div class="stat-item"><span class="stat-label">ATEND.</span><span class="stat-val">${b.atendimentos}</span></div>
                  <div class="stat-item"><span class="stat-label">TOTAL</span><span class="stat-val">R$ ${b.faturamento.toFixed(0)}</span></div>
                  <div class="stat-item"><span class="stat-label">TICKET</span><span class="stat-val">R$ ${b.ticket.toFixed(0)}</span></div>
                </div>
                
                <div class="progress-container">
                  <div class="progress-info"><span>📈 PROGRESSO META</span><span>${b.percentualMeta}%</span></div>
                  <div class="progress-bg">
                    <div class="progress-fill ${corBarra}" style="width: ${b.percentualMeta}%"></div>
                  </div>
                </div>

                <div class="meta-tag ${metaStatus}">${metaTexto}</div>
              </div>
            </div>
          `;
        });
        document.getElementById('barber-list').innerHTML = barberHTML;
      })
      .catch(err => {
        document.getElementById('msgLoading').style.display = 'none';
        alert("Erro ao carregar dados: " + err.message);
      });
    }

    window.onload = function() {
      const hoje = new Date();
      const mesPassado = new Date();
      mesPassado.setDate(hoje.getDate() - 30);
      
      document.getElementById('dataF').value = hoje.toISOString().split('T')[0];
      document.getElementById('dataI').value = mesPassado.toISOString().split('T')[0];
    };
  </script>
</body>
</html>
