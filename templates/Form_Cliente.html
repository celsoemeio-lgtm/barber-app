<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #000; color: white; font-family: 'Montserrat', sans-serif; padding: 15px; margin: 0; }
    
    .header-area { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 10px; 
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }

    .btn-voltar-img { 
      width: 150px; 
      height: 35px; 
      background: none; 
      border: none; 
      cursor: pointer; 
      flex-shrink: 0; 
      padding: 0;
    }
    .btn-voltar-img img { width: 100%; height: 100%; object-fit: fill; }

    h2 { color: #00ffff; font-size: 14px; letter-spacing: 1px; margin: 10px 0; text-transform: uppercase; }
    
    label { display: block; margin-top: 15px; color: #00BDB8; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    
    input, select { 
      width: 100%; padding: 12px; margin-top: 5px; background: #1a1a1a; 
      border: 1px solid #333; color: white; border-radius: 8px; 
      box-sizing: border-box; font-size: 14px; outline: none; 
    }
    input:focus, select:focus { border-color: #00ffff; }

    #msgStatus { 
      height: 20px; 
      color: #ff4d4d; 
      font-size: 12px; 
      text-align: center; 
      margin-top: 10px; 
      font-weight: bold; 
    }

    hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    
    .botoes-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    
    .btn-principal { 
      cursor: pointer; 
      background: #00ffff; 
      color: #000; 
      border: none; 
      width: 100%;
      padding: 14px;
      font-weight: bold; 
      border-radius: 8px; 
      text-transform: uppercase; 
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .btn-principal:hover {
      background: #00cccc;
      transform: scale(1.02);
    }
    
    .btn-principal:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
    
    .btn-secundario { 
      cursor: pointer; 
      background: transparent; 
      color: #00ffff; 
      border: 2px solid #00ffff;
      width: 100%;
      padding: 12px;
      font-weight: bold; 
      border-radius: 8px; 
      text-transform: uppercase; 
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .btn-secundario:hover {
      background: rgba(0, 255, 255, 0.1);
      transform: scale(1.02);
    }
    
    .btn-secundario:disabled { background: #444; color: #888; border-color: #888; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>

  <div class="header-area">
    <button class="btn-voltar-img" onclick="voltar()">
      <img src="https://lh3.googleusercontent.com/u/0/d/1V1WBS99sZAVN_6oBqmD1xa8MtOxBd73l" alt="VOLTAR">
    </button>
  </div>
  
  <h2 id="tituloPagina">CADASTRO DE CLIENTES</h2>

  <label>BUSCAR CLIENTE EXISTENTE (OPCIONAL)</label>
  <select id="selectBusca" onchange="carregarDadosDoCliente()">
    <option value="">-- NOVO CADASTRO --</option>
  </select>

  <hr>

  <label>NOME COMPLETO</label>
  <input type="text" id="nomeCli" placeholder="Digite o nome">
  
  <label>WHATSAPP</label>
  <input type="tel" id="whatsCli" placeholder="(00) 00000-0000" oninput="mascaraWhats(this)" maxlength="15">
  
  <label>PLANO</label>
  <select id="planoCli">
    <option value="Avulso">Avulso</option>
    <option value="VIP">VIP</option>
  </select>

  <div id="msgStatus"></div>
  
  <div class="botoes-container">
    <button id="btnNovo" class="btn-principal" onclick="salvarNovo()">➕ SALVAR NOVO CLIENTE</button>
    <button id="btnEditar" class="btn-secundario" onclick="atualizarCliente()">✏️ SALVAR ALTERAÇÕES</button>
  </div>

  <script>
    let listaClientes = [];
    let idxEditando = "";

    window.onload = function() {
      fetch('/api/clientes/listar', {
        credentials: 'include'
      })
      .then(res => res.json())
      .then(dados => {
        listaClientes = dados;
        let select = document.getElementById('selectBusca');
        select.innerHTML = '<option value="">-- NOVO CADASTRO --</option>';
        
        dados.forEach((c, index) => {
          let opt = document.createElement('option');
          opt.value = index;
          opt.text = c.nome;
          select.add(opt);
        });
      });
    };

    function carregarDadosDoCliente() {
      const idx = document.getElementById('selectBusca').value;
      const status = document.getElementById('msgStatus');
      
      if(idx === "") {
        limparCampos();
        document.getElementById('tituloPagina').innerText = "CADASTRO DE CLIENTES";
        idxEditando = "";
        return;
      }
      
      const cliente = listaClientes[idx];
      document.getElementById('nomeCli').value = cliente.nome;
      document.getElementById('whatsCli').value = cliente.whatsapp;
      document.getElementById('planoCli').value = cliente.plano;
      document.getElementById('tituloPagina').innerText = "EDITANDO: " + cliente.nome;
      status.innerText = "";
      idxEditando = idx;
    }

    function limparCampos() {
      document.getElementById('nomeCli').value = "";
      document.getElementById('whatsCli').value = "";
      document.getElementById('planoCli').value = "Avulso";
    }

    function mascaraWhats(i) {
      let v = i.value.replace(/\D/g, "");
      v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
      v = v.replace(/(\d{5})(\d)/, "$1-$2");
      i.value = v;
    }

    // BOTÃO 1: SALVAR NOVO CLIENTE
    function salvarNovo() {
      const n = document.getElementById('nomeCli').value.trim();
      const w = document.getElementById('whatsCli').value;
      const p = document.getElementById('planoCli').value;
      const status = document.getElementById('msgStatus');
      const btn = document.getElementById('btnNovo');
      
      if(n === "" || w.length < 14) {
        status.innerText = "⚠️ NOME E WHATS SÃO OBRIGATÓRIOS!";
        return;
      }

      btn.disabled = true;
      btn.innerText = "⌛ SALVANDO...";

      fetch('/api/clientes/salvar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          nome: n,
          whats: w,
          plano: p,
          idx: ""  // vazio = novo cliente
        })
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === "ok") {
          status.style.color = "#00ffff";
          status.innerText = "✅ NOVO CLIENTE CADASTRADO!";
          limparCampos();
          // Recarrega a lista de clientes
          location.reload();
        } else if (res.status === "duplicado") {
          status.innerText = "⚠️ CLIENTE JÁ CADASTRADO COM ESTE WHATSAPP!";
          btn.disabled = false;
          btn.innerText = "➕ SALVAR NOVO CLIENTE";
        } else {
          status.innerText = "❌ ERRO: " + res.status;
          btn.disabled = false;
          btn.innerText = "➕ SALVAR NOVO CLIENTE";
        }
      })
      .catch(err => {
        status.innerText = "❌ ERRO DE CONEXÃO";
        btn.disabled = false;
        btn.innerText = "➕ SALVAR NOVO CLIENTE";
      });
    }

    // BOTÃO 2: SALVAR ALTERAÇÕES (EDIÇÃO)
    function atualizarCliente() {
      const n = document.getElementById('nomeCli').value.trim();
      const w = document.getElementById('whatsCli').value;
      const p = document.getElementById('planoCli').value;
      const status = document.getElementById('msgStatus');
      const btn = document.getElementById('btnEditar');
      
      if(idxEditando === "") {
        status.innerText = "⚠️ SELECIONE UM CLIENTE PARA EDITAR!";
        return;
      }
      
      if(n === "" || w.length < 14) {
        status.innerText = "⚠️ NOME E WHATS SÃO OBRIGATÓRIOS!";
        return;
      }

      btn.disabled = true;
      btn.innerText = "⌛ ATUALIZANDO...";

      fetch('/api/clientes/salvar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          nome: n,
          whats: w,
          plano: p,
          idx: idxEditando
        })
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === "ok") {
          status.style.color = "#00ffff";
          status.innerText = "✅ CLIENTE ATUALIZADO!";
          setTimeout(voltar, 1000);
        } else {
          status.innerText = "❌ ERRO: " + res.status;
          btn.disabled = false;
          btn.innerText = "✏️ SALVAR ALTERAÇÕES";
        }
      })
      .catch(err => {
        status.innerText = "❌ ERRO DE CONEXÃO";
        btn.disabled = false;
        btn.innerText = "✏️ SALVAR ALTERAÇÕES";
      });
    }

    function voltar() {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
