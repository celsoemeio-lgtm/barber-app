<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background-color: #080a0f; color: #ffffff; padding: 8px; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
    
    #areaBotaoVoltar {
      width: 100%;
      display: none; 
      justify-content: center;
      padding: 10px 0;
      margin-bottom: 5px;
    }

    .btn-voltar-img {
      width: 150px;
      height: 35px;
      background: none;
      border: none;
      cursor: pointer;
      outline: none;
      padding: 0;
    }

    .btn-voltar-img img { width: 100%; height: 100%; object-fit: fill; }

    .header-row { 
      display: flex; justify-content: space-between; align-items: center; gap: 5px; margin-bottom: 8px; 
      background: #11141b; padding: 10px; border-radius: 4px; border: 1px solid #1f232d;
    }

    .input-data {
      background: #080a0f; border: 1px solid #00BDB8; color: #00BDB8; border-radius: 4px; 
      padding: 6px; font-weight: bold; font-size: 14px; width: 125px; text-align: center;
    }

    .grid-wrapper {
      width: 100%; overflow-x: auto; background: #11141b; border-radius: 4px; border: 1px solid #1f232d;
    }

    .grid-container { display: grid; gap: 1px; padding: 1px; }

    .cell { 
      background: #11141b; padding: 4px; text-align: center; font-size: 11px; 
      display: flex; align-items: center; justify-content: center; min-height: 50px; border: 1px solid #1c212a; 
    }

    .head { color: #00BDB8; font-weight: bold; background: #080a0f; text-transform: uppercase; }
    .time-cell { color: #00BDB8; font-weight: bold; font-size: 12px; }
    .livre { color: #50e3c2; font-weight: bold; cursor: pointer; }
    
    .btn-refresh { background: #50e3c2; color: #000; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-agenda { background: #00BDB8; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: none; }
  </style>
</head>
<body>

  <div id="areaBotaoVoltar">
    <button class="btn-voltar-img" onclick="voltarDash()">
      <img src="https://lh3.googleusercontent.com/u/0/d/1V1WBS99sZAVN_6oBqmD1xa8MtOxBd73l" alt="VOLTAR">
    </button>
  </div>

  <div class="header-row">
    <h2 style="margin:0; color:#50e3c2; font-size:14px;">🛡️ QUADRO DE HORARIOS</h2>
    <button id="btnDadosAgenda" class="btn-agenda" onclick="abrirDadosAgenda()">📅 EDITAR AGENDA</button>
    
    <input type="date" id="dataMapa" class="input-data" onchange="carregarMapa()">
    <button class="btn-refresh" onclick="carregarMapa()">🔄</button>
  </div>

  <div class="grid-wrapper">
    <div id="painelGrid" class="grid-container"></div>
  </div>

  <script>
    let usuarioAtual = {{ user|tojson }};

    window.onload = function() {
      const areaBotao = document.getElementById("areaBotaoVoltar");
      const btnAgenda = document.getElementById("btnDadosAgenda");

      if (usuarioAtual.tipo === "BARBEIRO") {
        areaBotao.style.display = "flex";
        if (usuarioAtual.nivel === "ADM") {
          btnAgenda.style.display = "block";
        }
      }

      const hoje = new Date().toISOString().split('T')[0];
      document.getElementById("dataMapa").value = hoje;
      carregarMapa();
    };

    function carregarMapa() {
      const data = document.getElementById("dataMapa").value;
      fetch('/api/agenda/dados', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({data: data})
      })
      .then(res => res.json())
      .then(desenharGrid);
    }

    function desenharGrid(res) {
      const grid = document.getElementById("painelGrid");
      grid.style.gridTemplateColumns = `60px repeat(${res.barbeiros.length}, 1fr)`;
      grid.style.minWidth = (60 + (res.barbeiros.length * 110)) + "px";
      
      let html = '<div class="cell head">HORA</div>';
      res.barbeiros.forEach(b => { html += `<div class="cell head">${b.split(' ')[0]}</div>`; });

      res.grade.forEach(linha => {
        html += `<div class="cell time-cell">${linha[0]}</div>`;
        for(let i=1; i <= res.barbeiros.length; i++) {
          const status = linha[i] || "";
          const barbeiro = res.barbeiros[i-1];
          if(status === "🟢 LIVRE") {
            html += `<div class="cell livre" onclick="tratarCliqueAgendar('${res.dataIso}', '${linha[0]}', '${barbeiro}')">LIVRE</div>`;
          } else {
            html += `<div class="cell" style="color:#50e3c2; font-size:10px; line-height:1.2;">${status}</div>`;
          }
        }
      });
      grid.innerHTML = html;
    }

    function tratarCliqueAgendar(data, hora, barbeiro) {
      let nomeParaOForm = "";
      if (usuarioAtual.tipo === "CLIENTE") {
        nomeParaOForm = usuarioAtual.nome;
      }

      fetch('/api/agenda/preparar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          data: data,
          horario: hora,
          barbeiro: barbeiro,
          cliente: nomeParaOForm,
          tipoLogin: usuarioAtual.tipo
        })
      }).then(() => {
        window.location.href = '/form_agendamento';
      });
    }

    function abrirDadosAgenda() {
      window.location.href = '/dados_agenda';
    }

    function voltarDash() {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
